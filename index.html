<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>AI Chat 设计方案对比</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#1f1e24;overflow:hidden}
iframe{position:fixed;inset:0;width:100%;height:100%;border:none;display:none}
iframe.active{display:block}
.sw{
  position:fixed;
  bottom:36px;
  left:50%;
  transform:translateX(-50%);
  z-index:9999;
  display:flex;
  gap:6px;
  background:rgba(10,10,16,.88);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.15);
  border-radius:999px;
  padding:6px;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  white-space:nowrap;
}
.sw button{
  background:transparent;
  border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.6);
  font-size:13px;font-weight:500;
  padding:7px 18px;
  border-radius:999px;
  cursor:pointer;
  font-family:"PingFang SC",sans-serif;
  -webkit-tap-highlight-color:transparent;
  transition:all .2s;
}
.sw button.on{
  background:linear-gradient(135deg,#6b8aff,#976bfb);
  border-color:transparent;
  color:#fff;
  box-shadow:0 2px 12px rgba(107,138,255,.5);
}
</style>
</head>
<body>
<iframe id="f1" src="design1.html" class="active"></iframe>
<iframe id="f2" src="design2.html"></iframe>
<iframe id="f3" src="design3.html"></iframe>
<div class="sw">
  <button class="on" onclick="go(1)">方案 1</button>
  <button onclick="go(2)">方案 2</button>
  <button onclick="go(3)">方案 3</button>
</div>
<script>
function go(n){
  document.querySelectorAll('iframe').forEach((f,i)=>f.classList.toggle('active',i+1===n));
  document.querySelectorAll('.sw button').forEach((b,i)=>b.classList.toggle('on',i+1===n));
}
</script>
</body>
</html>
